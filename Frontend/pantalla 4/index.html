<!DOCTYPE html>
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VS Tarjetas</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="contenedor">
    <!-- Tarjeta izquierda -->
    <div class="tarjeta">
      <div class="tarjeta-header">PAIS</div>
      <div class="tarjeta-body">
        <span class="icono">⚑</span>
      </div>
    </div>


    <!-- Línea divisoria con VS -->
    <div class="divisor">
      <div class="linea"></div>
      <div class="vs">VS</div>
    </div>


    <!-- Tarjeta derecha -->
    <div class="tarjeta">
      <div class="tarjeta-header">PAIS</div>
      <div class="tarjeta-body">
        <span class="icono">⚑</span>
      </div>
    </div>
  </div>
</body>
</html>
