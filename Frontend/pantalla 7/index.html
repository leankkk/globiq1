<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pantalla Registro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="rectangulo1">
    <input type="text" placeholder="Usuario">
  </div>

  <div class="rectangulo2">
    <input type="password" placeholder="Contraseña" id="password">
    <button type="button" class="toggle" onclick="togglePassword('password')">
      <svg xmlns="http://www.w3.org/2000/svg"
           width="20" height="20" fill="none"
           stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round"
           class="feather feather-eye">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>
    </button>
  </div>

  <div class="rectangulo3">
    <input type="password" placeholder="Repetir Contraseña" id="password2">
    <button type="button" class="toggle" onclick="togglePassword('password2')">
      <svg xmlns="http://www.w3.org/2000/svg"
           width="20" height="20" fill="none"
           stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round"
           class="feather feather-eye">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>
    </button>
  </div>

  <button class="btn">REGISTRAR</button>

  <script>
    function togglePassword(id) {
      let input = document.getElementById(id);
      if (input.type === "password") {
        input.type = "text"
      } else {
        input.type = "password"
      }
    }
  </script>
</body>
</html>
