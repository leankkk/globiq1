<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Modo Mayor o Menor</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <header class="header">
        <h1 id="categoriaNombre">TERRITORIO</h1>
        <button id="btnCambiarCategoria" class="boton2">Cambiar de categoría (3)</button>
    </header>

    <main class="contenedor">
        <!-- Tarjeta izquierda -->
        <div class="ladoIzquierdo">
            <div class="card paisIZQ">
                <!-- Ahora acá va el nombre del país -->
                <div class="card-header" id="paisInicialNombre">
                    <span class="flag-icon" id="banderaInicial"></span>
                    <span id="nombrePaisIZQ">Argentina</span>
                </div>

                <!-- Y acá abajo va el dato/pista -->
                <div class="card-content">
                    <h2 id="paisInicialDato">2.780.400 km²</h2>
                </div>
            </div>
        </div>

        <div class="vs">VS</div>

        <!-- Tarjeta derecha -->
        <div class="ladoDerecho">
            <div class="card paisDERCHO">
                <div class="card-header" id="pais2Nombre">
                    <span class="flag-icon" id="banderaDerecha"></span>
                    <span id="nombrePaisDER">Rumania</span>
                </div>
                <div class="selector">
                    <button id="btnMayor" class="boton">MAYOR</button>
                    <button id="btnMenor" class="boton">MENOR</button>
                </div>
            </div>
        </div>

        <!-- Modal -->
        <div id="myModal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <p id="mensajeResultado">¡Has perdido! Tu puntaje es: 0</p>
                <div class="botones">
                    <button id="btnJugar" class="btn-jugar">Jugar de nuevo</button>
                    <button id="btnPrincipal" class="btn-principal">Ir a la página principal</button>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.8.1/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/JZylber/SoqueTIC-Client@v1.4.2/soquetic-client.js"></script>
    <script src="main.js"></script>
</body>
</html>
